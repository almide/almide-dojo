# Pin the Almide compiler commit to evaluate against.
# Update manually when cutting a new MSR baseline.
# Pinning ensures day-to-day MSR numbers are comparable — compiler changes
# only affect results when you deliberately bump this.

[compiler]
repo = "github.com/almide/almide"
ref = "v0.13.3"  # 2026-04-12: MSR diagnostic improvements, codegen fixes, WASM json escape
