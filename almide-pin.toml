# Pin the Almide compiler commit to evaluate against.
# Update manually, or via CI from github.com/almide/almide main.
#
# During Phase 1 this is just `main`. In Phase 2 the harness will lock this
# to a specific SHA so that MSR numbers are reproducible day-to-day.

[compiler]
repo = "github.com/almide/almide"
ref = "main"
