<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Almide Dojo — MSR Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; padding: 2rem; } h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #58a6ff; } .subtitle { color: #8b949e; margin-bottom: 2rem; font-size: 0.9rem; } .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; } .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; } .card h2 { font-size: 1rem; color: #8b949e; margin-bottom: 1rem; } .metric { font-size: 2.5rem; font-weight: 700; } .metric.green { color: #3fb950; } .metric.yellow { color: #d29922; } .metric.blue { color: #58a6ff; } .chart-box { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; } .chart-box h2 { font-size: 1rem; color: #8b949e; margin-bottom: 1rem; } table { width: 100%; border-collapse: collapse; font-size: 0.85rem; } th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid #21262d; } th { color: #8b949e; font-weight: 600; } .pass { color: #3fb950; } .fail { color: #f85149; } .tag { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px; font-size: 0.75rem; font-weight: 600; } .tag.pass { background: #0d2818; } .tag.fail { background: #3d1418; } canvas { max-height: 300px; }</style>
</head>
<body>
<h1>Almide Dojo — MSR Dashboard</h1>
<p class="subtitle">Modification Survival Rate across LLM models</p>
<div class="grid" id="metrics"></div>
<div class="chart-box"><h2>Pass Rate Over Time</h2><canvas id="passChart"></canvas></div>
<div class="chart-box"><h2>Per-Task Results (Latest Run)</h2><div id="taskTable"></div></div>
<script>var DATA = [{"date":"2026-04-12-llama","model":"cf:@cf/meta/llama-3.3-70b-instruct-fp8-fast","total":27,"passed":16,"oneShot":9,"totalRetries":44,"tasks":[{"name":"clamp","result":"basic","retries":0},{"name":"count-vowels","result":"basic","retries":0},{"name":"factorial","result":"basic","retries":0},{"name":"fibonacci","result":"basic","retries":0},{"name":"fizzbuzz","result":"basic","retries":0},{"name":"gcd","result":"basic","retries":0},{"name":"list-sum","result":"basic","retries":0},{"name":"max-of-list","result":"basic","retries":0},{"name":"remove-duplicates","result":"basic","retries":0},{"name":"repeat-string","result":"basic","retries":0},{"name":"sum-digits","result":"basic","retries":0},{"name":"title-case","result":"basic","retries":0},{"name":"anagram-check","result":"intermediate","retries":0},{"name":"balanced-parens","result":"intermediate","retries":0},{"name":"binary-search","result":"intermediate","retries":0},{"name":"caesar-cipher","result":"intermediate","retries":0},{"name":"flatten-nested","result":"intermediate","retries":0},{"name":"partition-list","result":"intermediate","retries":0},{"name":"roman-numeral","result":"intermediate","retries":0},{"name":"run-length-encoding","result":"intermediate","retries":0},{"name":"word-count","result":"intermediate","retries":0},{"name":"zip-with","result":"intermediate","retries":0},{"name":"custom-linked-list","result":"advanced","retries":0},{"name":"expression-eval","result":"advanced","retries":0},{"name":"matrix-ops","result":"advanced","retries":0},{"name":"mini-json-query","result":"advanced","retries":0},{"name":"result-pipeline","result":"advanced","retries":0},{"name":"is-palindrome","result":"pass","retries":1},{"name":"is-prime","result":"pass","retries":2},{"name":"string-reverse","result":"pass","retries":0}]}];var L = DATA[DATA.length - 1];if (L) {  var pct = L.total > 0 ? Math.round(100 * L.passed / L.total) : 0;  var os = L.total > 0 ? Math.round(100 * L.oneShot / L.total) : 0;  document.getElementById('metrics').innerHTML =     '<div class="card"><h2>Pass Rate</h2><div class="metric green">' + pct + '%</div><div>' + L.passed + '/' + L.total + ' tasks</div></div>' +    '<div class="card"><h2>1-Shot Rate</h2><div class="metric yellow">' + os + '%</div><div>' + L.oneShot + '/' + L.total + ' tasks</div></div>' +    '<div class="card"><h2>Total Retries</h2><div class="metric blue">' + L.totalRetries + '</div><div>Model: ' + L.model + '</div></div>';}if (DATA.length > 0) {  new Chart(document.getElementById('passChart'), {    type: 'line',    data: {      labels: DATA.map(function(d){return d.date}),      datasets: [        { label: 'Pass %', data: DATA.map(function(d){return d.total>0?Math.round(100*d.passed/d.total):0}), borderColor: '#3fb950', tension: 0.3 },        { label: '1-Shot %', data: DATA.map(function(d){return d.total>0?Math.round(100*d.oneShot/d.total):0}), borderColor: '#d29922', tension: 0.3 }      ]    },    options: { scales: { y: { min: 0, max: 100, ticks: { color: '#8b949e' } }, x: { ticks: { color: '#8b949e' } } }, plugins: { legend: { labels: { color: '#c9d1d9' } } } }  });}if (L && L.tasks.length > 0) {  var rows = L.tasks.map(function(t){    var cls = t.result === 'pass' ? 'pass' : 'fail';    return '<tr><td>' + t.name + '</td><td><span class="tag ' + cls + '">' + t.result + '</span></td><td>' + t.retries + '</td></tr>';  }).join('');  document.getElementById('taskTable').innerHTML = '<table><thead><tr><th>Task</th><th>Result</th><th>Retries</th></tr></thead><tbody>' + rows + '</tbody></table>';}</script>
</body>
</html>
