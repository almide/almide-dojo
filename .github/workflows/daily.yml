name: Daily MSR Run

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily (12:00 JST)
  workflow_dispatch:
    inputs:
      model:
        description: 'Model to test against'
        required: false
        default: 'claude-sonnet-4-6'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install Almide
        run: |
          curl -fsSL https://raw.githubusercontent.com/almide/almide/main/tools/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Run all tasks
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODEL="${{ github.event.inputs.model || 'claude-sonnet-4-6' }}"
          almide run src/main.almd -- all "$MODEL" || true

      - name: Commit summary
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ -d "runs/$DATE" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add "runs/$DATE/"
            git diff --cached --quiet || git commit -m "Daily MSR run $DATE"
            git push
          else
            echo "No results generated for $DATE"
          fi
