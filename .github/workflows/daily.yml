name: Daily MSR Run

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily (12:00 JST)
  workflow_dispatch:
    inputs:
      models:
        description: 'Comma-separated model specs'
        required: false
        default: 'cf:@cf/meta/llama-3.3-70b-instruct-fp8-fast'

permissions:
  contents: write

jobs:
  run-msr:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        model:
          - 'cf:@cf/meta/llama-3.3-70b-instruct-fp8-fast'
          - 'cf:@cf/meta/llama-3.1-8b-instruct'
    steps:
      - uses: actions/checkout@v4

      - name: Install Almide (from llm-first-phase2 branch, temporary until v0.14.6 release)
        run: |
          cargo install --git https://github.com/almide/almide --branch llm-first-phase2 --bin almide --locked --force
          almide --version  # expect `almide 0.14.6-phase2` — if you see 0.14.5 the install silently cached

      - name: Run all tasks
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MODEL="${{ matrix.model }}"
          # Clear runs/ so this job's artifact contains ONLY this model's fresh
          # output. Without this, each matrix job uploads `runs/` including the
          # checked-out state (which has the OTHER model's historical data), and
          # the download-artifact merge in commit-results races — the model
          # whose artifact is applied last wins, the other model's fresh data
          # is silently overwritten by stale checked-out copies.
          rm -rf runs/
          echo "Running MSR with model: $MODEL"
          almide run src/main.almd -- all "$MODEL" || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: runs-${{ strategy.job-index }}
          path: runs/

  commit-results:
    needs: run-msr
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Almide
        run: |
          curl -fsSL https://raw.githubusercontent.com/almide/almide/main/tools/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: runs-*
          merge-multiple: true
          path: runs/

      - name: Regenerate dashboard
        run: |
          almide run dashboards/build.almd || true
          cp -f dashboards/index.html docs/index.html 2>/dev/null || true

      - name: Commit results and dashboard
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs/ docs/index.html dashboards/index.html
          git diff --cached --quiet || git commit -m "Daily MSR run $DATE (multi-model)"
          git push || true
