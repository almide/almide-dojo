name: Daily MSR Run

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily (12:00 JST)
  workflow_dispatch:
    inputs:
      model:
        description: 'Model spec (e.g. cf:@cf/meta/llama-3.3-70b-instruct-fp8-fast)'
        required: false
        default: 'cf:@cf/meta/llama-3.3-70b-instruct-fp8-fast'

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install Almide
        run: |
          curl -fsSL https://raw.githubusercontent.com/almide/almide/main/tools/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run all tasks
        env:
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CLOUDFLARE_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CLOUDFLARE_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          MODEL="${{ github.event.inputs.model || 'cf:@cf/meta/llama-3.3-70b-instruct-fp8-fast' }}"
          echo "Running MSR with model: $MODEL"
          almide run src/main.almd -- all "$MODEL" || true

      - name: Regenerate dashboard
        run: |
          almide run dashboards/build.almd || true
          cp -f dashboards/index.html docs/index.html 2>/dev/null || true

      - name: Commit results and dashboard
        run: |
          DATE=$(date -u +%Y-%m-%d)
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add runs/ docs/index.html dashboards/index.html
          git diff --cached --quiet || git commit -m "Daily MSR run $DATE"
          git push || true
